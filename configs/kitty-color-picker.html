<!DOCTYPE html>
<html>
<head>
  <title>Kitty Color Editor</title>

  <!-- Roboto font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', system-ui, sans-serif;
      background: #0d0d0d;
      color: #e6e6e6;
      padding: 24px;
    }

    h2, h3 {
      font-weight: 500;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .card {
      background: #1a1a1a;
      padding: 12px;
      border: 1px solid #2a2a2a;
    }

    .preview {
      height: 40px;
      margin-bottom: 10px;
      border: 1px solid #000;
    }

    .label {
      font-size: 13px;
      margin-bottom: 6px;
      color: #aaa;
    }

    input[type="color"] {
      width: 100%;
      height: 30px;
      border: none;
      background: none;
      padding: 0;
      margin-bottom: 6px;
      cursor: pointer;
    }

    input[type="text"] {
      width: 100%;
      padding: 6px;
      background: #0f0f0f;
      border: 1px solid #333;
      color: #eee;
      font-family: monospace;
    }

    textarea {
      width: 100%;
      height: 260px;
      margin-top: 16px;
      background: #000;
      color: #00ff9c;
      font-family: monospace;
      padding: 12px;
      border: 1px solid #333;
    }

    button {
      margin-top: 10px;
      padding: 10px 14px;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #eee;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>
<body>

<h2>Kitty Palette Editor</h2>
<div class="grid" id="grid"></div>

<h3>Generated kitty.conf snippet</h3>
<textarea id="output"></textarea>
<button onclick="copyOutput()">Copy to clipboard</button>

<script>
const names = [
  "black","red","green","yellow","blue","magenta","cyan","white",
  "bright black","bright red","bright green","bright yellow",
  "bright blue","bright magenta","bright cyan","bright white"
];

const zshMap = [
  "fg[black]","fg[red]","fg[green]","fg[yellow]",
  "fg[blue]","fg[magenta]","fg[cyan]","fg[white]",
  "fg_bold[black]","fg_bold[red]","fg_bold[green]","fg_bold[yellow]",
  "fg_bold[blue]","fg_bold[magenta]","fg_bold[cyan]","fg_bold[white]"
];

const colors = [
  "#191a23","#ea3b3b","#1dc44e","#e6d05a",
  "#5cc8ff","#a277ff","#3fd1ff","#bfbfbf",
  "#303241","#ff4f6a","#3ef08f","#ffe66d",
  "#6fd6ff","#bb8cff","#5fe1ff","#ffffff"
];

const grid = document.getElementById("grid");
const output = document.getElementById("output");

function updateOutput() {
  let text = "";

  colors.forEach((hex, i) => {
    text += `color${i} ${hex}  # ${names[i]} (${zshMap[i]})\n`;
  });

  output.value = text;
}

colors.forEach((hex, i) => {
  const card = document.createElement("div");
  card.className = "card";

  const preview = document.createElement("div");
  preview.className = "preview";
  preview.style.background = hex;

  const label = document.createElement("div");
  label.className = "label";
  label.textContent = `color${i} (${names[i]})`;

  const picker = document.createElement("input");
  picker.type = "color";
  picker.value = hex;

  const text = document.createElement("input");
  text.type = "text";
  text.value = hex;

  picker.oninput = e => {
    colors[i] = e.target.value;
    preview.style.background = e.target.value;
    text.value = e.target.value;
    updateOutput();
  };

  text.oninput = e => {
    colors[i] = e.target.value;
    preview.style.background = e.target.value;
    picker.value = e.target.value;
    updateOutput();
  };

  card.appendChild(label);
  card.appendChild(preview);
  card.appendChild(picker);
  card.appendChild(text);

  grid.appendChild(card);
});

function copyOutput() {
  output.select();
  document.execCommand("copy");
  alert("Copied to clipboard!");
}

updateOutput();
</script>

</body>
</html>
